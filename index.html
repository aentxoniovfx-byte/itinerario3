# Itinerario Blue Pink — RESET LIMPIO (VERSIÓN ESTABLE)

```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Itinerario Blue Pink</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter,system-ui,sans-serif;
  background:#0f1115;
  color:#e6e6e6;
  padding:20px;
}

button{
  background:#1f2937;
  color:#fff;
  border:1px solid #2d3748;
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
  margin:5px;
}

button:hover{background:#273244;}

table{
  width:100%;
  border-collapse:separate;
  border-spacing:10px;
  margin-top:15px;
}

th,td{
  background:#111827;
  border:1px solid rgba(76,201,240,0.2);
  border-radius:12px;
  padding:12px;
}

.dia{text-align:center;}

input{
  width:100%;
  background:transparent;
  border:none;
  color:white;
  outline:none;
}

.block{
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,0.03);
}

.row{
  display:flex;
  gap:8px;
  margin-top:6px;
}

.row input{
  flex:1;
  padding:6px;
  border-radius:8px;
  background:rgba(255,255,255,0.05);
}

.small{
  width:90px;
}

.del{
  background:transparent;
  border:none;
  color:#aaa;
  cursor:pointer;
}
</style>
</head>

<body>

<button onclick="addDay()">➕ Día</button>

<table>
<thead>
<tr>
<th>Día</th>
<th>Actividades</th>
<th>CAD</th>
<th>MXN</th>
</tr>
</thead>
<tbody id="app"></tbody>
</table>

<script>

const RATE = 13;

let data = JSON.parse(localStorage.getItem("trip_app")) || [];

function save(){
  localStorage.setItem("trip_app", JSON.stringify(data));
}

function addDay(){
  data.push({date:"",activities:[]});
  save();
  render();
}

function addActivity(d){
  data[d].activities.push({name:"",expenses:[]});
  save();
  render();
}

function addExpense(d,a){
  data[d].activities[a].expenses.push({name:"",value:0});
  save();
  render();
}

function calc(day){
  let total=0;
  day.activities.forEach(a=>{
    a.expenses.forEach(e=>{
      total += Number(e.value)||0;
    });
  });
  return total;
}

function render(){

  const app=document.getElementById("app");
  app.innerHTML="";

  data.forEach((day,di)=>{

    const total = calc(day);

    let activitiesHTML = "";

    day.activities.forEach((a,ai)=>{

      let expensesHTML = "";

      a.expenses.forEach((e,ei)=>{
        expensesHTML += `
          <div class="row">
            <input placeholder="gasto" value="${e.name}"
              onchange="data[${di}].activities[${ai}].expenses[${ei}].name=this.value;save()">

            <input class="small" type="number" value="${e.value}"
              onchange="data[${di}].activities[${ai}].expenses[${ei}].value=Number(this.value)||0;save();render()">

            <button class="del" onclick="data[${di}].activities[${ai}].expenses.splice(${ei},1);save();render()">✕</button>
          </div>
        `;
      });

      activitiesHTML += `
        <div class="block">

          <div class="row">
            <input placeholder="actividad" value="${a.name}"
              onchange="data[${di}].activities[${ai}].name=this.value;save()">

            <button class="del" onclick="data[${di}].activities.splice(${ai},1);save();render()">✕</button>
          </div>

          ${expensesHTML}

          <button onclick="addExpense(${di},${ai})">+ gasto</button>

        </div>
      `;

    });

    app.innerHTML += `
      <tr>
        <td class="dia">
          <input type="date" value="${day.date}"
            onchange="data[${di}].date=this.value;save();render()">
        </td>

        <td>
          <button onclick="addActivity(${di})">+ actividad</button>
          ${activitiesHTML}
        </td>

        <td>CAD $${total.toFixed(2)}</td>
        <td>MXN $${(total*RATE).toFixed(2)}</td>
      </tr>
    `;

  });

}

render();

</script>

</body>
</html>
```
