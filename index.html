<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Itinerario Sync</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', system-ui, sans-serif;
  background: #0f1115;
  color: #e6e6e6;
  padding: 20px;
}

button {
  background: #1f2937;
  color: white;
  border: 1px solid #2d3748;
  padding: 8px 12px;
  border-radius: 12px;
  cursor: pointer;
  margin: 5px;
}

table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 10px;
  margin-top: 15px;
}

th, td {
  padding: 14px;
  border-radius: 14px;
  background: #111827;
  border: 1px solid rgba(76,201,240,0.25);
}

/* CALENDARIO FIX */
.fechaTexto {
  margin-top: 8px;
  padding: 10px;
  border-radius: 12px;
  background: linear-gradient(135deg,
    rgba(76,201,240,0.25),
    rgba(247,37,133,0.25)
  );
  border: 1px solid rgba(76,201,240,0.5);
  text-align: center;
}

.fechaTexto div:nth-child(1){
  font-size: 12px;
  color: #4cc9f0;
  text-transform: uppercase;
}

.fechaTexto div:nth-child(2){
  font-size: 26px;
  font-weight: 700;
  color: #f72585;
}

.fechaTexto div:nth-child(3){
  font-size: 12px;
  opacity: 0.8;
}

.dia {
  text-align: center;
}

.dia input {
  width: 100%;
  background: transparent;
  border: none;
  color: white;
  text-align: center;
}

.block {
  margin-bottom: 12px;
  padding: 10px;
  border-radius: 12px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(76,201,240,0.2);
}

.header {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
}

.exp-row {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
}

.exp-name {
  flex: 1;
  padding: 8px;
  border-radius: 10px;
  background: rgba(76,201,240,0.08);
  border: 1px solid rgba(76,201,240,0.25);
}

.exp-value {
  width: 110px;
  padding: 8px;
  border-radius: 10px;
  background: rgba(247,37,133,0.08);
  border: 1px solid rgba(247,37,133,0.25);
}

input {
  width: 100%;
  background: transparent;
  border: none;
  color: white;
}

.del {
  background: transparent;
  border: none;
  color: #9ca3af;
  cursor: pointer;
}
</style>
</head>

<body>

<h2 id="totalGlobal">Total: CAD $0</h2>

<button onclick="addDay()">➕ Día</button>

<table>
<thead>
<tr>
<th>Día</th>
<th>Actividades</th>
<th>CAD</th>
<th>MXN</th>
</tr>
</thead>
<tbody id="app"></tbody>
</table>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCPPgAf7oDT7xiqj0PoK_25_kz6-ERmwIk",
  authDomain: "itinerario3-40c79.firebaseapp.com",
  projectId: "itinerario3-40c79",
  storageBucket: "itinerario3-40c79.appspot.com",
  messagingSenderId: "133043441925",
  appId: "1:133043441925:web:9f25c692691effa1faa76c"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let data = [];
let timeout;

/* AUTO SAVE */
function autoSave(){
  clearTimeout(timeout);
  timeout = setTimeout(save, 500);
}

/* SAVE FIREBASE */
function save(){
  db.collection("itinerarios").doc("main").set({ data });
}

/* REALTIME SYNC */
db.collection("itinerarios").doc("main")
.onSnapshot(doc => {
  if(doc.exists){
    data = doc.data().data || [];
    render();
  }
});

/* ADD */
function addDay(){
  data.push({ date:"", activities:[] });
  autoSave();
  render();
}

function addActivity(d){
  data[d].activities.push({ name:"", expenses:[] });
  autoSave();
  render();
}

function addExpense(d,a){
  data[d].activities[a].expenses.push({ name:"", value:0 });
  autoSave();
  render();
}

/* CALC */
function calc(day){
  return day.activities.reduce((sum,a)=>
    sum + a.expenses.reduce((s,e)=>s+(Number(e.value)||0),0),0);
}

/* DATE */
function formatDate(date){
  if(!date) return "";
  const d = new Date(date);
  const days=['dom','lun','mar','mié','jue','vie','sáb'];
  const months=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

  return `
    <div class="fechaTexto">
      <div>${months[d.getMonth()]}</div>
      <div>${d.getDate()}</div>
      <div>${days[d.getDay()]}</div>
    </div>
  `;
}

/* RENDER */
function render(){
  const app = document.getElementById("app");
  app.innerHTML = "";

  let total = 0;

  data.forEach((day,di)=>{
    const dayTotal = calc(day);
    total += dayTotal;

    app.innerHTML += `
      <tr>

        <td class="dia">
          <input type="date" value="${day.date}"
          onchange="data[${di}].date=this.value; autoSave()">
          ${formatDate(day.date)}
        </td>

        <td>
          <button onclick="addActivity(${di})">+ Actividad</button>

          ${day.activities.map((a,ai)=>`
            <div class="block">

              <div class="header">
                <input placeholder="Actividad" value="${a.name}"
                oninput="data[${di}].activities[${ai}].name=this.value; autoSave()">

                <button class="del"
                onclick="data[${di}].activities.splice(${ai},1); autoSave(); render()">✕</button>
              </div>

              ${a.expenses.map((e,ei)=>`
                <div class="exp-row">

                  <div class="exp-name">
                    <input placeholder="gasto" value="${e.name}"
                    oninput="data[${di}].activities[${ai}].expenses[${ei}].name=this.value; autoSave()">
                  </div>

                  <div class="exp-value">
                    <input type="number" value="${e.value}"
                    oninput="data[${di}].activities[${ai}].expenses[${ei}].value=this.value; autoSave()">
                  </div>

                  <button class="del"
                  onclick="data[${di}].activities[${ai}].expenses.splice(${ei},1); autoSave(); render()">✕</button>

                </div>
              `).join("")}

              <button onclick="addExpense(${di},${ai})">+ gasto</button>

            </div>
          `).join("")}
        </td>

        <td>CAD $${dayTotal.toFixed(2)}</td>
        <td>MXN $${(dayTotal*13).toFixed(2)}</td>

      </tr>
    `;
  });

  document.getElementById("totalGlobal").innerText =
    `Total: CAD $${total.toFixed(2)} | MXN $${(total*13).toFixed(2)}`;
}

render();
</script>

</body>
</html>
