<script>

/* =========================
   LOCAL STORAGE (SIN FIREBASE)
========================= */

const RATE = 13;

let data = JSON.parse(
  localStorage.getItem("trip_app")
) || [];

/* =========================
   SAVE LOCAL
========================= */

function save(){

  localStorage.setItem(
    "trip_app",
    JSON.stringify(data)
  );
}

/* =========================
   ADD DAY
========================= */

window.addDay = function(){

  data.push({
    date:"",
    activities:[]
  });

  save();
  render();
}

/* =========================
   ADD ACTIVITY
========================= */

window.addActivity = function(d){

  data[d].activities.push({
    name:"",
    expenses:[]
  });

  save();
  render();
}

/* =========================
   ADD EXPENSE
========================= */

window.addExpense = function(d,a){

  data[d]
    .activities[a]
    .expenses.push({
      name:"",
      value:0
    });

  save();
  render();
}

/* =========================
   CALC
========================= */

function calc(day){

  return day.activities.reduce(

    (sum,a)=>

      sum +

      a.expenses.reduce(
        (s,e)=>s+(Number(e.value)||0),
        0
      ),

    0
  );
}

/* =========================
   FORMAT DATE
========================= */

function formatDate(date){

  if(!date) return "";

  const d = new Date(date);

  const days = [
    'dom','lun','mar',
    'mié','jue','vie','sáb'
  ];

  const months = [
    'ene','feb','mar','abr',
    'may','jun','jul','ago',
    'sep','oct','nov','dic'
  ];

  return `
    <div class="fechaTexto">
      <div>${months[d.getMonth()]}</div>
      <div>${d.getDate()}</div>
      <div>${days[d.getDay()]}</div>
    </div>
  `;
}

/* =========================
   RENDER
========================= */

function render(){

  const app = document.getElementById("app");

  app.innerHTML = "";

  let grandTotalCAD = 0;

  data.forEach((day,di)=>{

    const total = calc(day);

    grandTotalCAD += total;

    app.innerHTML += `

      <tr>

        <td class="dia">

          <input
            type="date"
            value="${day.date || ""}"

            onchange="
              data[${di}].date=this.value;
              save();
              render();
            "
          >

          ${formatDate(day.date)}

        </td>

        <td>

          <button onclick="addActivity(${di})">
            + Actividad
          </button>

          ${day.activities.map((a,ai)=>`

            <div class="block">

              <div class="header">

                <input
                  placeholder="Actividad"
                  value="${a.name || ""}"

                  onchange="
                    data[${di}]
                    .activities[${ai}]
                    .name=this.value;

                    save();
                  "
                >

                <button
                  class="del"

                  onclick="
                    data[${di}]
                    .activities
                    .splice(${ai},1);

                    save();
                    render();
                  "
                >
                  ✕
                </button>

              </div>

              ${a.expenses.map((e,ei)=>`

                <div class="exp-row">

                  <div class="exp-name">

                    <input
                      placeholder="gasto"
                      value="${e.name || ""}"

                      onchange="
                        data[${di}]
                        .activities[${ai}]
                        .expenses[${ei}]
                        .name=this.value;

                        save();
                      "
                    >

                  </div>

                  <div class="exp-value">

                    <input
                      type="number"
                      value="${e.value || 0}"

                      onchange="
                        data[${di}]
                        .activities[${ai}]
                        .expenses[${ei}]
                        .value=this.value;

                        save();
                        render();
                      "
                    >

                  </div>

                  <button
                    class="del"

                    onclick="
                      data[${di}]
                      .activities[${ai}]
                      .expenses
                      .splice(${ei},1);

                      save();
                      render();
                    "
                  >
                    ✕
                  </button>

                </div>

              `).join("")}

              <button onclick="addExpense(${di},${ai})">
                + gasto
              </button>

            </div>

          `).join("")}

        </td>

        <td class="totalBox">
          CAD $${total.toFixed(2)}
        </td>

        <td class="totalBox">
          MXN $${(total * RATE).toFixed(2)}
        </td>

      </tr>

    `;
  });

  document.getElementById("grandCAD").textContent =
    grandTotalCAD.toFixed(2);

  document.getElementById("grandMXN").textContent =
    (grandTotalCAD * RATE).toFixed(2);
}

/* =========================
   CLEAR
========================= */

window.clearAll = function(){

  if(confirm("¿Borrar todo el itinerario?")){

    data = [];

    save();
    render();
  }
}

/* =========================
   PDF
========================= */

window.downloadPDF = function(){

  const element = document.getElementById("pdfArea");

  const opt = {

    margin: 0.4,

    filename: 'itinerario.pdf',

    image: {
      type: 'jpeg',
      quality: 1
    },

    html2canvas: {
      scale: 2,
      useCORS: true
    },

    jsPDF: {
      unit: 'in',
      format: 'letter',
      orientation: 'portrait'
    }
  };

  html2pdf()
    .set(opt)
    .from(element)
    .save();
}

/* =========================
   PWA
========================= */

if ("serviceWorker" in navigator) {

  navigator.serviceWorker.register("sw.js");
}

/* =========================
   START
========================= */

render();

window.data = data;
window.save = save;
window.render = render;

</script>
