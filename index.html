<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  doc,
  setDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyCXKiui1-tSBvn9k2kagulXQY77v6EhSQM",
  authDomain: "snooks-aad12.firebaseapp.com",
  projectId: "snooks-aad12",
  storageBucket: "snooks-aad12.firebasestorage.app",
  messagingSenderId: "264812199556",
  appId: "1:264812199556:web:ec6c7a64c08d86f29bccd1"
};

let data = [];
const RATE = 13;

let db, ref;

/* 🔥 INIT SAFE */
try {
  const app = initializeApp(firebaseConfig);
  db = getFirestore(app);
  ref = doc(db, "itinerary", "main");

  onSnapshot(ref, (snap) => {
    if (snap.exists()) {
      data = snap.data().data || [];
    }
    render();
  });

} catch (e) {
  console.log("Firebase error:", e);
  render(); // fallback para que NO quede en blanco
}

/* SAVE SAFE */
function save(){
  if (!db) return;

  setDoc(ref, {
    data,
    updatedAt: Date.now()
  }).catch(err => console.log("save error:", err));
}

/* ===== YOUR FUNCTIONS ===== */

window.addDay = function(){
  data.push({date:"", activities:[]});
  save();
  render();
}

window.addActivity = function(d){
  data[d].activities.push({name:"", expenses:[]});
  save();
  render();
}

window.addExpense = function(d,a){
  data[d].activities[a].expenses.push({name:"", value:0});
  save();
  render();
}

/* CALC */
function calc(day){
  return day.activities.reduce(
    (sum,a)=>
      sum + a.expenses.reduce(
        (s,e)=>s+(Number(e.value)||0),0
      ),0
  );
}

/* FORMAT DATE */
function formatDate(date){

  if(!date) return "";

  const d = new Date(date);

  const days = ['dom','lun','mar','mié','jue','vie','sáb'];
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

  return `
    <div class="fechaTexto">
      <div>${months[d.getMonth()]}</div>
      <div>${d.getDate()}</div>
      <div>${days[d.getDay()]}</div>
    </div>
  `;
}

/* 🔥 RENDER (SAFE - NO CRASHEA) */
function render(){

  const el = document.getElementById("app");
  if (!el) return;

  el.innerHTML = "";

  let total = 0;

  data.forEach((day,di)=>{

    const t = calc(day);
    total += t;

    el.innerHTML += `
      <tr>

        <td class="dia">
          <input type="date"
            value="${day.date || ""}"
            onchange="data[${di}].date=this.value; save();"
          >
          ${formatDate(day.date)}
        </td>

        <td>
          <button onclick="addActivity(${di})">+ Actividad</button>
        </td>

        <td class="totalBox">CAD $${t.toFixed(2)}</td>
        <td class="totalBox">MXN $${(t*RATE).toFixed(2)}</td>

      </tr>
    `;
  });

  const cad = document.getElementById("grandCAD");
  const mxn = document.getElementById("grandMXN");

  if (cad) cad.textContent = total.toFixed(2);
  if (mxn) mxn.textContent = (total*RATE).toFixed(2);

  window.data = data;
}

/* CLEAR */
window.clearAll = function(){
  data = [];
  save();
  render();
}

/* PDF */
window.downloadPDF = function(){
  html2pdf().from(document.body).save();
}

/* START SAFE */
window.data = data;
window.save = save;
window.render = render;

render();

</script>
