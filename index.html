<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  doc,
  setDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyCXKiui1-tSBvn9k2kagulXQY77v6EhSQM",
  authDomain: "snooks-aad12.firebaseapp.com",
  projectId: "snooks-aad12",
  storageBucket: "snooks-aad12.firebasestorage.app",
  messagingSenderId: "264812199556",
  appId: "1:264812199556:web:ec6c7a64c08d86f29bccd1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const docRef = doc(db, "itinerary", "main");

/* DATA */
let data = [];
const RATE = 13;

/* 🔥 REALTIME SYNC (NO rompe UI) */
onSnapshot(docRef, (snap) => {
  if (snap.exists()) {
    data = snap.data().data || [];
    render(); // SOLO refresca datos, NO toca diseño
  }
});

/* 🔥 SAVE (silencioso, sin render duplicado) */
function save(){
  setDoc(docRef, {
    data,
    updatedAt: Date.now()
  });
}

/* ADD DAY */
window.addDay = function(){
  data.push({date:"", activities:[]});
  save();
  render();
}

/* ADD ACTIVITY */
window.addActivity = function(d){
  data[d].activities.push({name:"", expenses:[]});
  save();
  render();
}

/* ADD EXPENSE */
window.addExpense = function(d,a){
  data[d].activities[a].expenses.push({name:"", value:0});
  save();
  render();
}

/* CALC (igual que tu versión) */
function calc(day){
  return day.activities.reduce(
    (sum,a)=>
      sum + a.expenses.reduce(
        (s,e)=>s+(Number(e.value)||0),0
      ),0
  );
}

/* FORMAT DATE (igual) */
function formatDate(date){

  if(!date) return "";

  const d = new Date(date);

  const days = ['dom','lun','mar','mié','jue','vie','sáb'];
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

  return `
    <div class="fechaTexto">
      <div>${months[d.getMonth()]}</div>
      <div>${d.getDate()}</div>
      <div>${days[d.getDay()]}</div>
    </div>
  `;
}

/* 🔥 RENDER (NO TOCAMOS TU DISEÑO) */
function render(){

  const appEl = document.getElementById("app");
  appEl.innerHTML = "";

  let grandTotalCAD = 0;

  data.forEach((day,di)=>{

    const total = calc(day);
    grandTotalCAD += total;

    appEl.innerHTML += `
      <tr>

        <td class="dia">

          <input type="date"
            value="${day.date || ""}"
            onchange="
              data[${di}].date=this.value;
              save();
              render();
            "
          >

          ${formatDate(day.date)}

        </td>

        <td>

          <button onclick="addActivity(${di})">+ Actividad</button>

          ${day.activities.map((a,ai)=>`

            <div class="block">

              <div class="header">

                <input
                  placeholder="Actividad"
                  value="${a.name || ""}"
                  onchange="
                    data[${di}].activities[${ai}].name=this.value;
                    save();
                  "
                >

                <button class="del"
                  onclick="
                    data[${di}].activities.splice(${ai},1);
                    save(); render();
                  ">✕</button>

              </div>

              ${a.expenses.map((e,ei)=>`

                <div class="exp-row">

                  <div class="exp-name">
                    <input
                      placeholder="gasto"
                      value="${e.name || ""}"
                      onchange="
                        data[${di}].activities[${ai}].expenses[${ei}].name=this.value;
                        save();
                      "
                    >
                  </div>

                  <div class="exp-value">
                    <input type="number"
                      value="${e.value || 0}"
                      onchange="
                        data[${di}].activities[${ai}].expenses[${ei}].value=this.value;
                        save();
                        render();
                      "
                    >
                  </div>

                  <button class="del"
                    onclick="
                      data[${di}].activities[${ai}].expenses.splice(${ei},1);
                      save(); render();
                    ">✕</button>

                </div>

              `).join("")}

              <button onclick="addExpense(${di},${ai})">+ gasto</button>

            </div>

          `).join("")}

        </td>

        <td class="totalBox">CAD $${total.toFixed(2)}</td>
        <td class="totalBox">MXN $${(total*RATE).toFixed(2)}</td>

      </tr>
    `;
  });

  document.getElementById("grandCAD").textContent = grandTotalCAD.toFixed(2);
  document.getElementById("grandMXN").textContent = (grandTotalCAD*RATE).toFixed(2);

  window.data = data;
}

/* CLEAR */
window.clearAll = function(){
  if(confirm("¿Borrar todo el itinerario?")){
    data = [];
    save();
    render();
  }
}

/* PDF */
window.downloadPDF = function(){
  html2pdf().from(document.body).save();
}

/* START */
window.data = data;
window.save = save;
window.render = render;

render();

</script>
