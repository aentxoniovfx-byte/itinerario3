<style>
body {
  margin: 0;
  font-family: Inter, system-ui, sans-serif;
  background: #0f1115;
  color: #e6e6e6;
  padding: 20px;
}

.topbar {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

button {
  background: #1f2937;
  color: white;
  border: 1px solid #2d3748;
  padding: 10px 14px;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 600;
}

button:hover {
  background:#273244;
}

table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 10px;
  margin-top: 15px;
}

th {
  text-align: center;
  font-weight: 800;
  padding: 14px;
  border-radius: 14px;
  background: #111827;
  border: 1px solid #2d333b;
}

td {
  padding: 14px;
  border-radius: 14px;
  background: #111827;
  border: 1px solid rgba(76,201,240,0.25);
  vertical-align: top;
}

/* 📅 DATE FIX (para que se vea el número) */
input[type="date"] {
  color-scheme: dark;
  color: white;
}

input[type="date"]::-webkit-calendar-picker-indicator {
  filter: invert(1);
  cursor: pointer;
}

/* BLOCK */
.block {
  margin-top: 10px;
  padding: 10px;
  border-radius: 12px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(76,201,240,0.2);
}

.row {
  display: flex;
  gap: 8px;
  margin-top: 6px;
}

.row input {
  flex: 1;
  padding: 8px;
  border-radius: 8px;
  background: rgba(255,255,255,0.05);
  border: none;
  color: white;
}

/* SMALL INPUT */
.small {
  width: 90px;
}

/* 🎨 COLORES RESTAURADOS */
.expense-name {
  background: rgba(76,201,240,0.15); /* AZUL */
}

.expense-value {
  background: rgba(247,37,133,0.15); /* ROSA */
}

/* TOTAL */
.totalBox {
  margin-top: 20px;
  padding: 16px;
  border-radius: 14px;
  background: linear-gradient(
    135deg,
    rgba(76,201,240,0.12),
    rgba(247,37,133,0.10)
  );
  border: 1px solid rgba(76,201,240,0.25);
  font-weight: 800;
}

/* INPUT GLOBAL FIX */
input {
  width: 100%;
  background: transparent;
  border: none;
  color: white;
  outline: none;
}
</style>
