<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Itinerario Blue Pink</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter,sans-serif;
  background:#0f1115;
  color:white;
  padding:20px;
}

.topbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}

button{
  background:#1f2937;
  color:white;
  border:1px solid #2d3748;
  padding:10px 14px;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
}

table{width:100%;border-spacing:10px;margin-top:10px;}

td,th{
  background:#111827;
  padding:12px;
  border-radius:12px;
}

input{
  width:100%;
  background:transparent;
  border:none;
  color:white;
  outline:none;
}
</style>
</head>

<body>

<div class="topbar">
  <button onclick="addDay()">➕ Día</button>
  <button onclick="downloadPDF()">📄 PDF</button>
  <button onclick="clearAll()">🗑️ Limpiar</button>
</div>

<table>
<thead>
<tr>
<th>Día</th>
<th>Actividades</th>
<th>CAD</th>
<th>MXN</th>
</tr>
</thead>
<tbody id="app"></tbody>
</table>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  doc,
  setDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyCXKiui1-tSBvn9k2kagulXQY77v6EhSQM",
  authDomain: "snooks-aad12.firebaseapp.com",
  projectId: "snooks-aad12",
  storageBucket: "snooks-aad12.firebasestorage.app",
  messagingSenderId: "264812199556",
  appId: "1:264812199556:web:ec6c7a64c08d86f29bccd1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* DATA */
let data = [];
const RATE = 13;

/* 🔥 REALTIME SYNC (lo más importante) */
const docRef = doc(db, "itinerary", "main");

onSnapshot(docRef, (snap) => {
  if (snap.exists()) {
    data = snap.data().data || [];
    render();
  }
});

/* 🔥 SAVE (autosave real) */
function save(){
  setDoc(docRef, {
    data,
    updatedAt: Date.now()
  });
}

/* ACTIONS */
window.addDay = function(){
  data.push({date:"",activities:[]});
  save();
  render();
}

window.clearAll = function(){
  if(confirm("¿Borrar todo?")){
    data = [];
    save();
    render();
  }
}

/* CALC */
function calc(day){
  return day.activities.reduce((s,a)=>
    s + a.expenses.reduce((e,x)=>e+(+x.value||0),0)
  ,0);
}

/* RENDER */
function render(){
  const app = document.getElementById("app");
  app.innerHTML = "";

  data.forEach((day,di)=>{

    const total = calc(day);

    app.innerHTML += `
      <tr>
        <td>
          <input type="date"
            value="${day.date||""}"
            oninput="data[${di}].date=this.value; save();"
          >
        </td>

        <td>
          <button onclick="addActivity(${di})">+ actividad</button>

          ${day.activities.map((a,ai)=>`
            <div>
              <input placeholder="actividad"
                value="${a.name||""}"
                oninput="data[${di}].activities[${ai}].name=this.value; save();"
              >

              ${a.expenses.map((e,ei)=>`
                <div>
                  <input placeholder="gasto"
                    value="${e.name||""}"
                    oninput="data[${di}].activities[${ai}].expenses[${ei}].name=this.value; save();"
                  >

                  <input type="number"
                    value="${e.value||0}"
                    oninput="data[${di}].activities[${ai}].expenses[${ei}].value=this.value; save();"
                  >
                </div>
              `).join("")}

              <button onclick="addExpense(${di},${ai})">+ gasto</button>
            </div>
          `).join("")}
        </td>

        <td>$${total.toFixed(2)}</td>
        <td>$${(total*RATE).toFixed(2)}</td>
      </tr>
    `;
  });

  window.data = data;
}

/* ADD */
window.addActivity = function(d){
  data[d].activities.push({name:"",expenses:[]});
  save();
  render();
}

window.addExpense = function(d,a){
  data[d].activities[a].expenses.push({name:"",value:0});
  save();
  render();
}

/* PDF */
window.downloadPDF = function(){
  html2pdf().from(document.body).save();
}

/* START */
window.data = data;
window.save = save;
window.render = render;

</script>

</body>
</html>
