<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Itinerario Blue Pink</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1115">

<style>

/* ===== TU CSS SIN CAMBIOS ===== */

body {
  margin: 0;
  font-family: 'Inter', system-ui, sans-serif;
  background: #0f1115;
  color: #e6e6e6;
  padding: 20px;
}

.topbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}

button{
  background:#1f2937;
  color:white;
  border:1px solid #2d3748;
  padding:10px 14px;
  border-radius:12px;
  cursor:pointer;
  transition:0.2s;
  font-weight:600;
}

button:hover{transform:translateY(-1px);background:#273244;}

table{width:100%;border-collapse:separate;border-spacing:10px;margin-top:15px;}

th{text-align:center;font-weight:800;padding:14px;border-radius:14px;background:#111827;border:1px solid #2d333b;}

td{padding:14px;border-radius:14px;background:#111827;border:1px solid rgba(76,201,240,0.25);vertical-align:top;}

.dia{text-align:center;}

input{width:100%;background:transparent;border:none;color:white;outline:none;}

.block{margin-bottom:12px;padding:10px;border-radius:12px;background:rgba(255,255,255,0.03);border:1px solid rgba(76,201,240,0.2);}

.header{display:flex;gap:8px;margin-bottom:8px;}

.exp-row{display:flex;gap:8px;margin-bottom:8px;}

.exp-name{flex:1;padding:8px;border-radius:10px;background:rgba(76,201,240,0.08);border:1px solid rgba(76,201,240,0.25);}

.exp-value{width:110px;padding:8px;border-radius:10px;background:rgba(247,37,133,0.08);border:1px solid rgba(247,37,133,0.25);}

.del{background:transparent;border:none;color:#9ca3af;cursor:pointer;}

.totalBox{font-weight:700;}

.grandTotal{
  margin-top:20px;
  padding:22px;
  border-radius:18px;
  background:linear-gradient(135deg,rgba(76,201,240,0.12),rgba(247,37,133,0.10));
}

</style>

</head>

<body>

<div class="topbar">
  <button onclick="addDay()">➕ Día</button>
  <button onclick="downloadPDF()">📄 PDF</button>
  <button onclick="clearAll()">🗑️ Limpiar</button>
</div>

<div id="pdfArea">

<table>

<thead>
<tr>
<th>Día</th>
<th>Actividades</th>
<th>CAD</th>
<th>MXN</th>
</tr>
</thead>

<tbody id="app"></tbody>

</table>

<div class="grandTotal">
  💰 Total: CAD <span id="grandCAD">0</span> | MXN <span id="grandMXN">0</span>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {
  apiKey: "AIzaSyBEkmNLTcNj5u2XR90Y38nacxJYA2_uvsQ",
  authDomain: "itinerario-bluepink.firebaseapp.com",
  projectId: "itinerario-bluepink",
  storageBucket: "itinerario-bluepink.firebasestorage.app",
  messagingSenderId: "411796393279",
  appId: "1:411796393279:web:5c898918f5a8c8a391978a"
};

const appFirebase = initializeApp(firebaseConfig);
const db = getFirestore(appFirebase);

/* DATA */

let data = [];
const RATE = 13;

/* SAVE */

async function save(){
  await setDoc(doc(db,"itinerary","main"), {
    data
  }, { merge: true });
}

/* REALTIME (FIXED) */

let firstLoad = true;

function load(){

  onSnapshot(doc(db,"itinerary","main"), (snap)=>{

    if(snap.exists()){

      const serverData = snap.data().data || [];

      if(firstLoad){
        data = serverData;
        render();
        firstLoad = false;
      }

    } else {
      data = [];
      render();
    }

  });

}

/* ADD */

window.addDay = function(){
  data.push({date:"",activities:[]});
  save();
  render();
}

window.addActivity = function(d){
  data[d].activities.push({name:"",expenses:[]});
  save();
  render();
}

window.addExpense = function(d,a){
  data[d].activities[a].expenses.push({name:"",value:0});
  save();
  render();
}

/* DELETE FIXED */

window.delActivity = function(d,a){
  data[d].activities.splice(a,1);
  save();
  render();
}

window.delExpense = function(d,a,e){
  data[d].activities[a].expenses.splice(e,1);
  save();
  render();
}

/* CALC */

function calc(day){
  return day.activities.reduce((sum,a)=>
    sum + a.expenses.reduce((s,e)=>s+(Number(e.value)||0),0)
  ,0);
}

/* RENDER */

function render(){

  const app = document.getElementById("app");
  app.innerHTML = "";

  let total = 0;

  data.forEach((day,di)=>{

    const t = calc(day);
    total += t;

    app.innerHTML += `
      <tr>

        <td class="dia">
          <input type="date" value="${day.date||""}"
            onchange="data[${di}].date=this.value;save();"
          >
        </td>

        <td>

          <button onclick="addActivity(${di})">+ Actividad</button>

          ${day.activities.map((a,ai)=>`

            <div class="block">

              <div class="header">

                <input value="${a.name||""}"
                  onchange="data[${di}].activities[${ai}].name=this.value;save();"
                >

                <button class="del" onclick="delActivity(${di},${ai})">✕</button>

              </div>

              ${a.expenses.map((e,ei)=>`

                <div class="exp-row">

                  <input class="exp-name" value="${e.name||""}"
                    onchange="data[${di}].activities[${ai}].expenses[${ei}].name=this.value;save();"
                  >

                  <input class="exp-value" type="number" value="${e.value||0}"
                    onchange="data[${di}].activities[${ai}].expenses[${ei}].value=this.value;save();"
                  >

                  <button class="del" onclick="delExpense(${di},${ai},${ei})">✕</button>

                </div>

              `).join("")}

              <button onclick="addExpense(${di},${ai})">+ gasto</button>

            </div>

          `).join("")}

        </td>

        <td class="totalBox">CAD $${t.toFixed(2)}</td>
        <td class="totalBox">MXN $${(t*RATE).toFixed(2)}</td>

      </tr>
    `;
  });

  document.getElementById("grandCAD").textContent = total.toFixed(2);
  document.getElementById("grandMXN").textContent = (total*RATE).toFixed(2);
}

/* CLEAR */

window.clearAll = function(){
  if(confirm("¿Borrar todo?")){
    data = [];
    save();
    render();
  }
}

/* PDF */

window.downloadPDF = function(){
  html2pdf().from(document.getElementById("pdfArea")).save();
}

/* START */

load();

</script>

</body>
</html>
