<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Itinerario Blue Pink</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', system-ui, sans-serif;
  background: #0f1115;
  color: #e6e6e6;
  padding: 20px;
}

.topbar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

button {
  background: #1f2937;
  color: white;
  border: 1px solid #2d3748;
  padding: 10px 14px;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 600;
}

button:hover{
  background:#273244;
}

table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 10px;
  margin-top: 15px;
}

th {
  text-align: center;
  font-weight: 800;
  padding: 14px;
  border-radius: 14px;
  background: #111827;
  border: 1px solid #2d333b;
}

td {
  padding: 14px;
  border-radius: 14px;
  background: #111827;
  border: 1px solid rgba(76,201,240,0.25);
  vertical-align: top;
}

/* DATE */
.dia input{
  width:100%;
  background:transparent;
  border:none;
  color:white;
  text-align:center;
  color-scheme: dark;
}

/* FECHA VISUAL */
.fechaTexto {
  margin-top: 8px;
  padding: 10px;
  border-radius: 12px;
  background: linear-gradient(135deg,
    rgba(76,201,240,0.12),
    rgba(247,37,133,0.10)
  );
  border: 1px solid rgba(76,201,240,0.25);
}

.fechaTexto div:nth-child(1){ color:#4cc9f0; font-size:13px;}
.fechaTexto div:nth-child(2){ color:#f72585; font-size:28px; font-weight:700;}
.fechaTexto div:nth-child(3){ color:#ff8dc7; font-size:13px;}

/* ACTIVIDAD */
.block {
  margin-bottom: 12px;
  padding: 10px;
  border-radius: 12px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(76,201,240,0.2);
}

.header {
  display:flex;
  gap:8px;
  margin-bottom:8px;
}

.header input{
  flex:1;
  background: rgba(76,201,240,0.08);
  border:1px solid rgba(76,201,240,0.25);
  border-radius:10px;
  padding:8px;
  color:white;
}

/* 🔥 FIX REAL: columnas separadas sin overlap */
.exp-row{
  display:grid;
  grid-template-columns: 1fr 120px 40px;
  gap:10px;
  margin-bottom:8px;
  align-items:center;
}

.exp-name input{
  width:100%;
  padding:8px;
  border-radius:10px;
  background: rgba(247,37,133,0.10);
  border:1px solid rgba(247,37,133,0.25);
  color:white;
  box-sizing:border-box;
}

.exp-value input{
  width:100%;
  padding:8px;
  border-radius:10px;
  background: rgba(76,201,240,0.10);
  border:1px solid rgba(76,201,240,0.25);
  color:white;
  box-sizing:border-box;
}

.del{
  background:transparent;
  border:none;
  color:#9ca3af;
  cursor:pointer;
}

/* TOTAL */
.totalBox{
  font-weight:700;
  white-space:nowrap;
  color:#4cc9f0;
}

.totalBox:last-child{
  color:#f72585;
}

/* TOTAL GENERAL */
.grandTotal{
  margin-top:20px;
  padding:22px;
  border-radius:18px;
  background: linear-gradient(135deg,
    rgba(76,201,240,0.12),
    rgba(247,37,133,0.10)
  );
  border:1px solid rgba(247,37,133,0.25);
}

.grandTitle{ font-weight:800; margin-bottom:10px; }
.grandRow{ display:flex; justify-content:space-between; margin-top:10px;}
.grandValue{ font-weight:800; color:#f72585; }

</style>
</head>

<body>

<div class="topbar">
  <button onclick="addDay()">➕ Día</button>
  <button onclick="downloadPDF()">📄 PDF</button>
  <button onclick="clearAll()">🗑️ Limpiar</button>
</div>

<div id="pdfArea">

<table>
<thead>
<tr>
<th>Día</th>
<th>Actividades</th>
<th>CAD</th>
<th>MXN</th>
</tr>
</thead>

<tbody id="app"></tbody>
</table>

<div class="grandTotal">
  <div class="grandTitle">💰 Total</div>
  <div class="grandRow">
    <div>CAD</div>
    <div class="grandValue" id="grandCAD">$0</div>
  </div>
  <div class="grandRow">
    <div>MXN</div>
    <div class="grandValue" id="grandMXN">$0</div>
  </div>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
const RATE = 13;
let data = JSON.parse(localStorage.getItem("trip_app")) || [];

function save(){
  localStorage.setItem("trip_app", JSON.stringify(data));
}

function addDay(){
  data.push({date:"", activities:[]});
  save(); render();
}

function addActivity(d){
  data[d].activities.push({name:"", expenses:[]});
  save(); render();
}

function addExpense(d,a){
  data[d].activities[a].expenses.push({name:"", value:0});
  save(); render();
}

function calc(day){
  return day.activities.reduce((s,a)=>
    s + a.expenses.reduce((x,e)=>x+(Number(e.value)||0),0),0);
}

function formatDate(date){
  if(!date) return "";
  const d=new Date(date);
  const days=['dom','lun','mar','mié','jue','vie','sáb'];
  const months=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

  return `
  <div class="fechaTexto">
    <div>${months[d.getMonth()]}</div>
    <div>${d.getDate()}</div>
    <div>${days[d.getDay()]}</div>
  </div>`;
}

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";

  let totalCAD=0;

  data.forEach((day,di)=>{
    const total=calc(day);
    totalCAD+=total;

    app.innerHTML+=`
<tr>
<td>
<input type="date" value="${day.date||""}"
onchange="data[${di}].date=this.value; save(); render()">
${formatDate(day.date||"")}
</td>

<td>
<button onclick="addActivity(${di})">+ Actividad</button>

${day.activities.map((a,ai)=>`
<div class="block">

<div class="header">
<input value="${a.name||""}"
onchange="data[${di}].activities[${ai}].name=this.value; save()">
<button class="del"
onclick="data[${di}].activities.splice(${ai},1); save(); render()">✕</button>
</div>

${a.expenses.map((e,ei)=>`
<div class="exp-row">

<div class="exp-name">
<input value="${e.name||""}"
onchange="data[${di}].activities[${ai}].expenses[${ei}].name=this.value; save()">
</div>

<div class="exp-value">
<input type="number" value="${e.value||0}"
onchange="data[${di}].activities[${ai}].expenses[${ei}].value=this.value; save(); render()">
</div>

<button class="del"
onclick="data[${di}].activities[${ai}].expenses.splice(${ei},1); save(); render()">✕</button>

</div>
`).join("")}

<button onclick="addExpense(${di},${ai})">+ gasto</button>

</div>
`).join("")}

</td>

<td>CAD $${total.toFixed(2)}</td>
<td>MXN $${(total*RATE).toFixed(2)}</td>
</tr>`;
  });

  document.getElementById("grandCAD").textContent="$"+totalCAD.toFixed(2);
  document.getElementById("grandMXN").textContent="$"+(totalCAD*RATE).toFixed(2);
}

function clearAll(){
  if(confirm("Borrar todo?")){
    data=[];
    save(); render();
  }
}

function downloadPDF(){
  html2pdf().from(document.getElementById("pdfArea")).save("itinerario.pdf");
}

render();
</script>

</body>
</html>
