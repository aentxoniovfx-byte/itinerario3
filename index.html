<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Itinerario Blue Pink</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Inter, system-ui, sans-serif;
  background: #0f1115;
  color: #e6e6e6;
  padding: 20px;
}

.topbar {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

button {
  background: #1f2937;
  color: white;
  border: 1px solid #2d3748;
  padding: 10px 14px;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 600;
}

button:hover {
  background:#273244;
}

table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 10px;
  margin-top: 15px;
}

th {
  text-align: center;
  font-weight: 800;
  padding: 14px;
  border-radius: 14px;
  background: #111827;
  border: 1px solid #2d333b;
}

td {
  padding: 14px;
  border-radius: 14px;
  background: #111827;
  border: 1px solid rgba(76,201,240,0.25);
  vertical-align: top;
}

/* GLASS BLOCK */
.block {
  margin-top: 10px;
  padding: 10px;
  border-radius: 12px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(76,201,240,0.2);
}

.row {
  display: flex;
  gap: 8px;
  margin-top: 6px;
}

.row input {
  flex: 1;
  padding: 8px;
  border-radius: 8px;
  background: rgba(255,255,255,0.05);
  border: none;
  color: white;
}

.small {
  width: 90px;
}

input {
  width: 100%;
  background: transparent;
  border: none;
  color: white;
  outline: none;
}

/* TOTAL SOLO ABAJO */
.totalBox {
  margin-top: 20px;
  padding: 16px;
  border-radius: 14px;
  background: linear-gradient(
    135deg,
    rgba(76,201,240,0.12),
    rgba(247,37,133,0.10)
  );
  border: 1px solid rgba(76,201,240,0.25);
  font-weight: 800;
}
</style>
</head>

<body>

<div class="topbar">
  <button onclick="addDay()">➕ Día</button>
  <button onclick="downloadPDF()">📄 PDF</button>
  <button onclick="clearAll()">🗑️ Limpiar</button>
</div>

<div id="pdfArea">

<table>
<thead>
<tr>
<th>Día</th>
<th>Actividades</th>
<th>CAD</th>
<th>MXN</th>
</tr>
</thead>

<tbody id="app"></tbody>
</table>

</div>

<!-- SOLO TOTAL FINAL -->
<div class="totalBox">
  💰 Total General:
  CAD $<span id="cadTotal">0</span> |
  MXN $<span id="mxnTotal">0</span>
</div>

<script>

const RATE = 13;
let data = JSON.parse(localStorage.getItem("trip_app")) || [];

function save(){
  localStorage.setItem("trip_app", JSON.stringify(data));
}

function addDay(){
  data.push({date:"",activities:[]});
  save();
  render();
}

function addActivity(d){
  data[d].activities.push({name:"",expenses:[]});
  save();
  render();
}

function addExpense(d,a){
  data[d].activities[a].expenses.push({name:"",value:0});
  save();
  render();
}

function calc(day){
  let total = 0;
  day.activities.forEach(a=>{
    a.expenses.forEach(e=>{
      total += Number(e.value)||0;
    });
  });
  return total;
}

/* INPUT SAFE */
function bindInputs(){

  document.querySelectorAll("[data-type]").forEach(el=>{

    el.oninput = () => {

      const {type,di,ai,ei} = el.dataset;

      if(type==="day") data[di].date = el.value;
      if(type==="activity") data[di].activities[ai].name = el.value;
      if(type==="expn") data[di].activities[ai].expenses[ei].name = el.value;
      if(type==="expv") data[di].activities[ai].expenses[ei].value = Number(el.value)||0;

      save();
      updateTotals();
    };
  });
}

function updateTotals(){

  let cad = 0;

  data.forEach(d=>{
    cad += calc(d);
  });

  document.getElementById("cadTotal").innerText = cad.toFixed(2);
  document.getElementById("mxnTotal").innerText = (cad*RATE).toFixed(2);
}

function render(){

  const app = document.getElementById("app");
  app.innerHTML = "";

  data.forEach((day,di)=>{

    let total = calc(day);
    let html = "";

    day.activities.forEach((a,ai)=>{

      let exp = "";

      a.expenses.forEach((e,ei)=>{

        exp += `
        <div class="row">

          <input data-type="expn"
            data-di="${di}" data-ai="${ai}" data-ei="${ei}"
            value="${e.name||""}" placeholder="gasto">

          <input data-type="expv"
            type="number"
            data-di="${di}" data-ai="${ai}" data-ei="${ei}"
            value="${e.value||0}" class="small">

          <button onclick="data[${di}].activities[${ai}].expenses.splice(${ei},1);save();render()">✕</button>

        </div>`;
      });

      html += `
      <div class="block">

        <div class="row">

          <input data-type="activity"
            data-di="${di}" data-ai="${ai}"
            value="${a.name||""}" placeholder="actividad">

          <button onclick="data[${di}].activities.splice(${ai},1);save();render()">✕</button>

        </div>

        ${exp}

        <button onclick="addExpense(${di},${ai})">+ gasto</button>

      </div>`;
    });

    app.innerHTML += `
    <tr>

      <td>
        <input data-type="day"
          data-di="${di}"
          type="date"
          value="${day.date||""}">
      </td>

      <td>
        <button onclick="addActivity(${di})">+ actividad</button>
        ${html}
      </td>

      <td>CAD $${total.toFixed(2)}</td>
      <td>MXN $${(total*RATE).toFixed(2)}</td>

    </tr>`;
  });

  bindInputs();
  updateTotals();
}

/* PDF */
function downloadPDF(){
  html2pdf().from(document.getElementById("pdfArea")).set({
    margin:0.4,
    filename:"itinerario.pdf",
    image:{type:"jpeg",quality:1},
    html2canvas:{scale:2},
    jsPDF:{unit:"in",format:"letter"}
  }).save();
}

function clearAll(){
  if(confirm("¿Borrar todo?")){
    data = [];
    save();
    render();
  }
}

render();

</script>

</body>
</html>
