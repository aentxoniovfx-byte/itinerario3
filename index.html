<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Itinerario Blue Pink</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1115">

<style>
/* ====== TU CSS SIN CAMBIOS ====== */

body {
  margin: 0;
  font-family: 'Inter', system-ui, sans-serif;
  background: #0f1115;
  color: #e6e6e6;
  padding: 20px;
}

.topbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}

button {
  background:#1f2937;
  color:white;
  border:1px solid #2d3748;
  padding:10px 14px;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
}

button:hover{transform:translateY(-1px);background:#273244;}

table{width:100%;border-collapse:separate;border-spacing:10px;margin-top:15px;}

th{text-align:center;font-weight:800;padding:14px;border-radius:14px;background:#111827;border:1px solid #2d333b;}

td{padding:14px;border-radius:14px;background:#111827;border:1px solid rgba(76,201,240,0.25);vertical-align:top;}

input{width:100%;background:transparent;border:none;color:white;outline:none;}
</style>
</head>

<body>

<div class="topbar">
  <button onclick="addDay()">➕ Día</button>
  <button onclick="downloadPDF()">📄 PDF</button>
  <button onclick="clearAll()">🗑️ Limpiar</button>
</div>

<table>
<thead>
<tr>
<th>Día</th>
<th>Actividades</th>
<th>CAD</th>
<th>MXN</th>
</tr>
</thead>
<tbody id="app"></tbody>
</table>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  doc,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ===== FIREBASE REAL ===== */
const firebaseConfig = {
  apiKey: "AIzaSyCXKiui1-tSBvn9k2kagulXQY77v6EhSQM",
  authDomain: "snooks-aad12.firebaseapp.com",
  projectId: "snooks-aad12",
  storageBucket: "snooks-aad12.firebasestorage.app",
  messagingSenderId: "264812199556",
  appId: "1:264812199556:web:ec6c7a64c08d86f29bccd1"
};

const appFirebase = initializeApp(firebaseConfig);
const db = getFirestore(appFirebase);

/* ===== DATA ===== */
let data = [];
const RATE = 13;

/* ===== LOAD ===== */
async function load(){
  const snap = await getDoc(doc(db, "itinerary", "main"));
  if(snap.exists()){
    data = snap.data().data || [];
  }
  render();
}

/* ===== SAVE (SYNC REAL) ===== */
async function save(){
  await setDoc(doc(db, "itinerary", "main"), {
    data,
    updatedAt: Date.now()
  });
}

/* ===== ACTIONS ===== */
window.addDay = function(){
  data.push({date:"", activities:[]});
  save(); render();
}

window.clearAll = function(){
  if(confirm("¿Borrar todo?")){
    data = [];
    save(); render();
  }
}

/* ===== CALC ===== */
function calc(day){
  return day.activities.reduce((sum,a)=>
    sum + a.expenses.reduce((s,e)=>s+(Number(e.value)||0),0)
  ,0);
}

/* ===== RENDER ===== */
function render(){
  const app = document.getElementById("app");
  app.innerHTML = "";

  let totalCAD = 0;

  data.forEach((day,di)=>{
    const total = calc(day);
    totalCAD += total;

    app.innerHTML += `
      <tr>
        <td>
          <input type="date"
            value="${day.date || ""}"
            onchange="data[${di}].date=this.value; save();"
          >
        </td>

        <td>
          <button onclick="addActivity(${di})">+ Actividad</button>

          ${day.activities.map((a,ai)=>`
            <div>
              <input placeholder="Actividad"
                value="${a.name || ""}"
                onchange="data[${di}].activities[${ai}].name=this.value; save();"
              >

              ${a.expenses.map((e,ei)=>`
                <div>
                  <input placeholder="Gasto"
                    value="${e.name || ""}"
                    onchange="data[${di}].activities[${ai}].expenses[${ei}].name=this.value; save();"
                  >

                  <input type="number"
                    value="${e.value || 0}"
                    onchange="data[${di}].activities[${ai}].expenses[${ei}].value=this.value; save(); render();"
                  >
                </div>
              `).join("")}

              <button onclick="addExpense(${di},${ai})">+ gasto</button>
            </div>
          `).join("")}
        </td>

        <td>$${total.toFixed(2)}</td>
        <td>$${(total*RATE).toFixed(2)}</td>
      </tr>
    `;
  });

  window.data = data;
}

/* ===== ADD FUNCTIONS ===== */
window.addActivity = function(d){
  data[d].activities.push({name:"", expenses:[]});
  save(); render();
}

window.addExpense = function(d,a){
  data[d].activities[a].expenses.push({name:"", value:0});
  save(); render();
}

/* ===== PDF ===== */
window.downloadPDF = function(){
  html2pdf().from(document.body).save();
}

/* ===== START ===== */
load();

window.data = data;
window.save = save;
window.render = render;

</script>

</body>
</html>
