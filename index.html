<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Itinerario Blue Pink</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Inter, system-ui, sans-serif;
  background: #0f1115;
  color: #e6e6e6;
  padding: 20px;
}

button {
  background: #1f2937;
  color: white;
  border: 1px solid #2d3748;
  padding: 8px 12px;
  border-radius: 12px;
  cursor: pointer;
  margin: 5px;
}

table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 10px;
  margin-top: 15px;
}

th, td {
  background: #111827;
  border: 1px solid rgba(76,201,240,0.25);
  border-radius: 12px;
  padding: 12px;
}

.dia input {
  width: 100%;
  background: transparent;
  border: none;
  color: white;
  text-align: center;
}

.block {
  margin-top: 10px;
  padding: 10px;
  border-radius: 10px;
  background: rgba(255,255,255,0.03);
}

.row {
  display: flex;
  gap: 8px;
  margin-top: 6px;
}

.row input {
  flex: 1;
  padding: 6px;
  border-radius: 8px;
  background: rgba(255,255,255,0.05);
  border: none;
  color: white;
}

.small {
  width: 90px;
}

</style>
</head>

<body>

<button onclick="addDay()">➕ Día</button>

<table>
<thead>
<tr>
<th>Día</th>
<th>Actividades</th>
<th>CAD</th>
<th>MXN</th>
</tr>
</thead>

<tbody id="app"></tbody>
</table>

<script>

const RATE = 13;

let data = JSON.parse(localStorage.getItem("trip_app")) || [];

function save(){
  localStorage.setItem("trip_app", JSON.stringify(data));
}

function addDay(){
  data.push({date:"",activities:[]});
  save();
  render();
}

function addActivity(d){
  data[d].activities.push({name:"",expenses:[]});
  save();
  render();
}

function addExpense(d,a){
  data[d].activities[a].expenses.push({name:"",value:0});
  save();
  render();
}

function calc(day){
  let total = 0;
  day.activities.forEach(a=>{
    a.expenses.forEach(e=>{
      total += Number(e.value)||0;
    });
  });
  return total;
}

/* 🔥 IMPORTANTE: inputs SIN romper escritura */
function bindInputs(){

  document.querySelectorAll("[data-type]").forEach(el=>{

    el.oninput = () => {

      const {type,di,ai,ei} = el.dataset;

      if(type==="day"){
        data[di].date = el.value;
      }

      if(type==="activity"){
        data[di].activities[ai].name = el.value;
      }

      if(type==="expense-name"){
        data[di].activities[ai].expenses[ei].name = el.value;
      }

      if(type==="expense-value"){
        data[di].activities[ai].expenses[ei].value = Number(el.value)||0;
      }

      save();
    };
  });
}

function render(){

  const app = document.getElementById("app");
  app.innerHTML = "";

  data.forEach((day,di)=>{

    const total = calc(day);

    let activitiesHTML = "";

    day.activities.forEach((a,ai)=>{

      let expensesHTML = "";

      a.expenses.forEach((e,ei)=>{

        expensesHTML += `
          <div class="row">

            <input data-type="expense-name"
              data-di="${di}" data-ai="${ai}" data-ei="${ei}"
              value="${e.name || ""}" placeholder="gasto">

            <input data-type="expense-value"
              type="number"
              data-di="${di}" data-ai="${ai}" data-ei="${ei}"
              value="${e.value || 0}" class="small">

            <button onclick="data[${di}].activities[${ai}].expenses.splice(${ei},1);save();render()">✕</button>

          </div>
        `;
      });

      activitiesHTML += `
        <div class="block">

          <div class="row">

            <input data-type="activity"
              data-di="${di}" data-ai="${ai}"
              value="${a.name || ""}" placeholder="actividad">

            <button onclick="data[${di}].activities.splice(${ai},1);save();render()">✕</button>

          </div>

          ${expensesHTML}

          <button onclick="addExpense(${di},${ai})">+ gasto</button>

        </div>
      `;
    });

    app.innerHTML += `
      <tr>

        <td class="dia">
          <input data-type="day"
            data-di="${di}"
            type="date"
            value="${day.date || ""}">
        </td>

        <td>
          <button onclick="addActivity(${di})">+ actividad</button>
          ${activitiesHTML}
        </td>

        <td>CAD $${total.toFixed(2)}</td>
        <td>MXN $${(total * RATE).toFixed(2)}</td>

      </tr>
    `;
  });

  bindInputs();
}

render();

</script>

</body>
</html>
