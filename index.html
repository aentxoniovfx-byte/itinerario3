```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blue Pink Itinerary</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    min-height:100vh;
    background:
    radial-gradient(circle at top left,#4facfe22,transparent 30%),
    radial-gradient(circle at bottom right,#ff6ec722,transparent 30%),
    linear-gradient(135deg,#07111f,#0f172a,#131c31);
    color:white;
    padding:40px 20px;
}

.container{
    max-width:1000px;
    margin:auto;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
    gap:20px;
    flex-wrap:wrap;
}

.title{
    font-size:2rem;
    font-weight:700;
    background:linear-gradient(90deg,#5ab2ff,#ff71ce);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.actions{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

button{
    border:none;
    padding:12px 18px;
    border-radius:16px;
    background:rgba(255,255,255,0.08);
    color:white;
    cursor:pointer;
    backdrop-filter:blur(12px);
    transition:0.25s;
    font-weight:600;
}

button:hover{
    transform:translateY(-2px);
    background:rgba(255,255,255,0.15);
}

.card{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.12);
    backdrop-filter:blur(16px);
    border-radius:28px;
    padding:24px;
    margin-bottom:25px;
    box-shadow:0 8px 30px rgba(0,0,0,0.3);
}

.section-title{
    display:flex;
    align-items:center;
    gap:12px;
    font-size:1.2rem;
    margin-bottom:18px;
    font-weight:600;
}

.section-title i{
    color:#7dc7ff;
}

.input-group{
    display:grid;
    grid-template-columns:1fr 1fr 1fr auto;
    gap:12px;
}

input, textarea{
    width:100%;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.1);
    color:white;
    padding:14px;
    border-radius:16px;
    outline:none;
    font-family:inherit;
}

textarea{
    resize:vertical;
    min-height:80px;
}

input::placeholder,
textarea::placeholder{
    color:#c7d3e0;
}

.add-btn{
    background:linear-gradient(135deg,#5ab2ff,#ff71ce);
}

.event{
    padding:18px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    margin-top:16px;
    border:1px solid rgba(255,255,255,0.08);
}

.event-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    margin-bottom:10px;
}

.event-title{
    font-weight:700;
    font-size:1.1rem;
}

.date{
    color:#7dc7ff;
    font-size:0.95rem;
}

.notes{
    color:#d8dce3;
    line-height:1.5;
}

.delete-btn{
    background:#ff4b6e;
}

.calendar-icon{
    background:linear-gradient(135deg,#5ab2ff,#ff71ce);
    width:40px;
    height:40px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:14px;
    color:white;
}

@media(max-width:800px){

.input-group{
    grid-template-columns:1fr;
}

.header{
    flex-direction:column;
    align-items:flex-start;
}

.actions{
    width:100%;
}

button{
    width:100%;
}

}
</style>
</head>
<body>

<div class="container" id="content">

<div class="header">
    <div>
        <h1 class="title">Blue Pink Itinerary</h1>
    </div>

    <div class="actions">
        <button onclick="exportData()">
            <i class="fa-solid fa-file-export"></i>
            Exportar
        </button>

        <button onclick="document.getElementById('importFile').click()">
            <i class="fa-solid fa-file-import"></i>
            Importar
        </button>

        <button onclick="downloadPDF()">
            <i class="fa-solid fa-file-pdf"></i>
            PDF
        </button>
    </div>
</div>

<input type="file" id="importFile" hidden>

<div class="card">

<div class="section-title">
    <div class="calendar-icon">
        <i class="fa-solid fa-calendar-days"></i>
    </div>
    Nuevo Evento
</div>

<div class="input-group">
    <input type="text" id="title" placeholder="Título">
    <input type="date" id="date">
    <input type="time" id="time">

    <button class="add-btn" onclick="addEvent()">
        <i class="fa-solid fa-plus"></i>
    </button>
</div>

<br>

<textarea id="notes" placeholder="Notas..."></textarea>

</div>

<div id="events"></div>

</div>

<script>

let itinerary = [];

function saveData(){
    localStorage.setItem('bluePinkItinerary', JSON.stringify(itinerary));
}

function loadData(){
    const saved = localStorage.getItem('bluePinkItinerary');

    if(saved){
        itinerary = JSON.parse(saved);
        renderEvents();
    }
}

function addEvent(){

    const title = document.getElementById('title').value;
    const date = document.getElementById('date').value;
    const time = document.getElementById('time').value;
    const notes = document.getElementById('notes').value;

    if(!title || !date){
        alert('Agrega título y fecha');
        return;
    }

    itinerary.push({
        id:Date.now(),
        title,
        date,
        time,
        notes
    });

    saveData();
    renderEvents();

    document.getElementById('title').value='';
    document.getElementById('date').value='';
    document.getElementById('time').value='';
    document.getElementById('notes').value='';
}

function renderEvents(){

    const container = document.getElementById('events');

    container.innerHTML='';

    itinerary.sort((a,b)=> new Date(a.date) - new Date(b.date));

    itinerary.forEach(event=>{

        container.innerHTML += `
        <div class="card event">

            <div class="event-header">
                <div>
                    <div class="event-title">${event.title}</div>
                    <div class="date">
                        <i class="fa-regular fa-calendar"></i>
                        ${event.date}
                        ${event.time ? '• '+event.time : ''}
                    </div>
                </div>

                <button class="delete-btn" onclick="deleteEvent(${event.id})">
                    <i class="fa-solid fa-trash"></i>
                </button>
            </div>

            <div class="notes">
                ${event.notes || ''}
            </div>

        </div>
        `;

    });
}

function deleteEvent(id){

    itinerary = itinerary.filter(event=> event.id !== id);

    saveData();
    renderEvents();
}

function exportData(){

    const dataStr = JSON.stringify(itinerary, null, 2);

    const blob = new Blob([dataStr], {
        type:'application/json'
    });

    const a = document.createElement('a');

    a.href = URL.createObjectURL(blob);
    a.download = 'blue-pink-itinerary.json';
    a.click();
}

document.getElementById('importFile').addEventListener('change', function(e){

    const file = e.target.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(event){

        try{
            itinerary = JSON.parse(event.target.result);

            saveData();
            renderEvents();

            alert('Itinerario importado correctamente');

        }catch(err){
            alert('Archivo inválido');
        }

    };

    reader.readAsText(file);
});

function downloadPDF(){

    const element = document.getElementById('content');

    const options = {
        margin:0.5,
        filename:'BluePinkItinerary.pdf',
        image:{ type:'jpeg', quality:1 },
        html2canvas:{ scale:2 },
        jsPDF:{ unit:'in', format:'letter', orientation:'portrait' }
    };

    html2pdf().set(options).from(element).save();
}

loadData();

</script>

</body>
</html>
